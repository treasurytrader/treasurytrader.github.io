하루 거래량이 15만 계약 정도로 갠춘하고 장이 열리는 시간도 짧아서 집중해서 매매할 수 있는 선물이다.<br>

크루드 오일이나 금처럼 미친듯이 발광하는 선물이 아니라 편안하게 매매할 수 있는 선물이다.<br>
